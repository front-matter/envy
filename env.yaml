meta:
  name: InvenioRDM Starter
  description: InvenioRDM Starter configuration.
  version: "v13.0.8"
  docs: https://inveniordm.docs.cern.ch/reference/configuration/

# Type reference:
# - string: Plain text value.
# - url: URL value including scheme, e.g. https://example.org.
# - bool: Boolean as string, typically "True" or "False".
# - int: Integer value as string, e.g. "5".
# - python_literal: Python literal string parsed to a Python object
#   (e.g. "['a']", "[{'host': 'opensearch', 'port': 9200}]", "True").

groups:
  - name: Application
    description: Core Flask/InvenioRDM application settings
    vars:
      - key: INVENIO_APP_NAME
        default: "InvenioRDM Starter"
        description: Human-readable name shown in UI and emails
        required: false
        type: string

      - key: INVENIO_SITE_UI_URL
        default: "https://demo.front-matter.de"
        description: Public UI URL. No trailing slash. Used for link generation.
        required: true
        type: url

      - key: INVENIO_SITE_API_URL
        default: "https://demo.front-matter.de/api"
        description: Public API URL. No trailing slash.
        required: true
        type: url

      - key: INVENIO_TRUSTED_HOSTS
        default: "['demo.front-matter.de']"
        description: Flask TRUSTED_HOSTS list literal. Add 'localhost' for dev.
        required: true
        type: python_literal

      - key: INVENIO_DEBUG
        default: "False"
        description: Never True in production.
        required: false
        type: bool
        allowed: ["True", "False"]

  - name: Secrets
    description: Cryptographic keys. Must be unique per instance. Never reuse across environments.
    vars:
      - key: INVENIO_SECRET_KEY
        secret: true
        description: >
          Flask secret key.
          Generate with: python -c "import secrets; print(secrets.token_hex(32))"
        required: true
        type: string
        min_length: 32

      - key: INVENIO_SECURITY_LOGIN_SALT
        secret: true
        description: Salt for login tokens. Generate same way as SECRET_KEY.
        required: true
        type: string
        min_length: 16

  - name: Database
    description: PostgreSQL connection. Pool settings tuned for InvenioRDM workloads.
    vars:
      - key: INVENIO_SQLALCHEMY_DATABASE_URI
        secret: true
        description: >
          Full SQLAlchemy URI.
          Format: postgresql+psycopg2://user:pass@host:5432/dbname
        required: true
        type: string
        example: "postgresql+psycopg2://rogue:secret@db:5432/rogue"

      - key: INVENIO_DB_POOL_SIZE
        default: "5"
        description: SQLAlchemy pool size per worker. Total connections = pool_size × workers.
        required: false
        type: int

      - key: INVENIO_DB_MAX_OVERFLOW
        default: "10"
        description: Extra connections beyond pool_size allowed temporarily.
        required: false
        type: int

  - name: Cache and Broker
    description: Redis/Valkey configuration.
    vars:
      - key: ACCOUNTS_SESSION_REDIS_URL
        default: "redis://cache:6379/0"
        description: Base Redis URL.
        required: true
        type: url

      - key: CELERY_BROKER_URL
        default: "redis://cache:6379/1"
        description: Celery broker URL.
        required: true
        type: url

      - key: BROKER_URL
        default: "redis://cache:6379/1"
        description: Alias of CELERY_BROKER_URL.
        required: true
        type: url

      - key: CELERY_RESULT_BACKEND
        default: "redis://cache:6379/2"
        description: Celery result backend.
        required: true
        type: url

      - key: RATELIMIT_STORAGE_URL
        default: "redis://cache:6379/3"
        description: Rate limit storage URL.
        required: false
        type: url

      - key: CACHE_REDIS_URL
        default: "redis://cache:6379/4"
        description: Cache URL.
        required: true
        type: url

      - key: COMMUNITIES_IDENTITIES_CACHE_REDIS_URL
        default: "redis://cache:6379/4"
        description: Alias of CACHE_REDIS_URL.
        required: true
        type: url

  - name: Search
    description: OpenSearch connection and index configuration.
    vars:
      - key: INVENIO_SEARCH_HOSTS
        default: "[{'host': 'opensearch', 'port': 9200}]"
        description: OpenSearch hosts list. Python literal evaluated by InvenioRDM.
        required: true
        type: python_literal

      - key: INVENIO_SEARCH_INDEX_PREFIX
        default: "rogue-"
        description: Prefix for all OpenSearch indices. Include trailing dash.
        required: false
        type: string

  - name: Object Storage
    description: S3-compatible storage.
    vars:
      - key: INVENIO_S3_ENDPOINT_URL
        default: "https://s3.eu-central-1.hetzner.com"
        description: S3-compatible endpoint URL.
        required: true
        type: url

      - key: INVENIO_S3_ACCESS_KEY_ID
        secret: true
        description: S3 access key ID.
        required: true
        type: string

      - key: INVENIO_S3_SECRET_ACCESS_KEY
        secret: true
        description: S3 secret access key.
        required: true
        type: string

      - key: INVENIO_S3_REGION_NAME
        default: "eu-central-1"
        description: S3 region identifier.
        required: false
        type: string

      - key: INVENIO_DEFAULT_FILES_LOCATION
        default: "s3://rogue-scholar-files"
        description: Default storage location URI for InvenioRDM file records.
        required: true
        type: string

  - name: Authentication
    description: Keycloak OIDC configuration. Local login disabled in production.
    vars:
      - key: INVENIO_ACCOUNTS_LOCAL_LOGIN_ENABLED
        default: "False"
        description: Disable to force Keycloak-only authentication.
        required: false
        type: bool
        allowed: ["True", "False"]

      - key: INVENIO_OAUTHCLIENT_KEYCLOAK_REALM_URL
        default: "https://auth.rogue-scholar.org/realms/main"
        description: Keycloak realm base URL.
        required: true
        type: url

      - key: INVENIO_OAUTHCLIENT_KEYCLOAK_CLIENT_ID
        secret: true
        description: Keycloak client ID registered in the realm.
        required: true
        type: string

      - key: INVENIO_OAUTHCLIENT_KEYCLOAK_CLIENT_SECRET
        secret: true
        description: Keycloak client secret registered in the realm.
        required: true
        type: string

  - name: Mail
    description: SMTP configuration for transactional email.
    vars:
      - key: INVENIO_MAIL_SERVER
        default: "smtp.example.com"
        description: SMTP server hostname.
        required: true
        type: string

      - key: INVENIO_MAIL_PORT
        default: "587"
        description: "SMTP port: 587 for STARTTLS, 465 for SSL, 25 for plain."
        required: false
        type: int

      - key: INVENIO_MAIL_USE_TLS
        default: "True"
        description: Enable STARTTLS.
        required: false
        type: bool
        allowed: ["True", "False"]

      - key: INVENIO_MAIL_USERNAME
        secret: true
        description: SMTP authentication username.
        required: true
        type: string

      - key: INVENIO_MAIL_PASSWORD
        secret: true
        description: SMTP authentication password.
        required: true
        type: string

      - key: INVENIO_MAIL_DEFAULT_SENDER
        default: "no-reply@rogue-scholar.org"
        description: From address for all outbound email.
        required: true
        type: string

  - name: Monitoring
    description: Observability stack — VictoriaMetrics, VictoriaLogs, GlitchTip.
    vars:
      - key: INVENIO_SENTRY_DSN
        secret: true
        description: Sentry DSN for error tracking.
        required: false
        type: string

      - key: INVENIO_LOG_LEVEL
        default: "INFO"
        description: Root log level passed to structlog/stdlib logging.
        required: false
        type: string
        allowed: ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]

  - name: Features
    description: Feature flags controlling InvenioRDM capabilities.
    vars:
      - key: INVENIO_COMMUNITIES_ENABLED
        default: "True"
        description: Enable the communities feature.
        required: false
        type: bool
        allowed: ["True", "False"]

      - key: INVENIO_RDM_ALLOW_METADATA_ONLY_RECORDS
        default: "True"
        description: Allow records without file attachments.
        required: false
        type: bool
        allowed: ["True", "False"]
