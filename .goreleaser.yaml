# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

brews:
  - name: envy
    homepage: https://github.com/front-matter/envy
    description: "Envy is an environment variable manager for Docker."
    license: MIT

    # The tap repository to push the formula to
    repository:
      owner: front-matter
      name: homebrew-envy
      # Separate token needed — GITHUB_TOKEN can't push to other repos
      token: "{{ .Env.HOMEBREW_TOKEN }}"

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    commit_msg_template: "chore: update {{ .ProjectName }} formula to {{ .Tag }}"

    # Install instructions
    install: |
      bin.install "envy"

    # Post-install message
    caveats: |
      Run `envy --help` to get started.
      Place env.yaml in your project root and run `envy compose`.

    # Shell completion
    extra_install: |
      generate_completions_from_executable(bin/"envy", "completion")

    test: |
      system "#{bin}/envy", "--version"
